name: Remote Windows Build

on:
  workflow_dispatch: # Allows you to trigger the build manually with a button click

jobs:
  build:
    runs-on: windows-2022 # Pin the host machine to the stable Windows 2022 image

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24 # Switched to Node 24 to perfectly match the project requirements

    - name: Setup MSBuild and VS Compiler Environments
      uses: microsoft/setup-msbuild@v2

    - name: Install Dependencies
      # Force node-gyp to use the stable Visual Studio 2022 compilers pre-installed on this server
      run: npm ci --msvs_version=2022

    - name: Compile Application
      run: npm run compile

    - name: Package Everything Together
      uses: actions/upload-artifact@v4
      with:
        name: vscode-windows-ready-build
        path: . # Packages the source code and your fast build caches together into a zip file
