name: Remote Linux Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install Missing Linux Development Libraries
      run: |
        sudo apt-get update
        sudo apt-get install -y libkrb5-dev libx11-dev libxkbfile-dev pkg-config build-essential

    - name: Fast Install Dependencies
      # --no-audit and --omit=optional skips downloading heavy browser binaries
      run: npm ci --no-audit --omit=optional
      env:
        PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1 # Skips downloading massive testing browsers

    - name: Compile Application
      run: npm run compile

    - name: Package Everything Together
      uses: actions/upload-artifact@v4
      with:
        name: vscode-windows-ready-build
        path: .
