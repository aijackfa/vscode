name: Remote Windows Build

on:
  workflow_dispatch: # Allows you to trigger the build manually with a button click

jobs:
  build:
    runs-on: windows-latest # Boot up GitHub's high-power Windows server

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install Dependencies
      # Fixes the node-gyp error by forcing it to use the stable VS 2022 toolset
      run: npm ci --msvs_version=2022

    - name: Compile Application
      run: npm run compile

    - name: Package Everything Together
      uses: actions/upload-artifact@v4
      with:
        name: vscode-windows-ready-build
        path: . # Includes the source code and pre-compiled caches together
