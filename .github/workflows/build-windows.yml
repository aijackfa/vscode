name: Remote Windows Build

on:
  workflow_dispatch: # Allows you to trigger the build manually with a button click

jobs:
  build:
    runs-on: windows-2022 # Pin the runner to a stable Windows 2022 image

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22 # Use Node 22 to cleanly support modern preinstall native TS execution

    - name: Setup MSBuild and VS Compiler Environments
      uses: microsoft/setup-msbuild@v2

    - name: Install Dependencies
      # Bypasses the local gyp engine crash by assigning variables to the stable toolset directly
      run: npm ci --msvs_version=2022

    - name: Compile Application
      run: npm run compile

    - name: Package Everything Together
      uses: actions/upload-artifact@v4
      with:
        name: vscode-windows-ready-build
        path: . # Includes all compiled build caches and codebase items together
