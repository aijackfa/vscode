name: Remote Windows Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022 # Pin the virtual machine to older, stable 2022 architecture

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20 # Pin to stable Node 20 which matches native node-gyp bindings

    - name: Setup MSBuild and VS Compiler Environments
      uses: microsoft/setup-msbuild@v2

    - name: Install Dependencies
      run: npm ci

    - name: Compile Application
      run: npm run compile

    - name: Package Everything Together
      uses: actions/upload-artifact@v4
      with:
        name: vscode-windows-ready-build
        path: .
