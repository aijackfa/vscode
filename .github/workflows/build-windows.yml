name: Remote Linux Build

on:
  workflow_dispatch: # Allows you to trigger the build manually with a button click

jobs:
  build:
    runs-on: ubuntu-latest # Swapped to ultra-fast, stable Linux runner to prevent freezing

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24 # Matches the required engine update natively

    - name: Install Dependencies
      run: npm ci

    - name: Compile Application
      run: npm run compile

    - name: Package Everything Together
      uses: actions/upload-artifact@v4
      with:
        name: vscode-windows-ready-build
        path: . # Packages the source code and your fast build caches together into a zip file
